<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">ログイン | 犬猫の健康管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 id="brand-title">🐾 犬猫の健康管理</h1>
    <p class="auth-sub">保護団体のメンバーでログインしてください</p>

    <form id="login-form">
      <label for="email">ユーザー名 または メールアドレス</label>
      <input type="text" id="email" required autocomplete="username" placeholder="例: tanaka1 または yamada@example.com">
      <p class="hint-text">
        ユーザー名にする場合は、半角(小さいサイズ)のアルファベット(a〜z)と数字(0〜9)が使えます。<br>
        例: <span class="mono">tanaka1</span>(名前+数字)、<span class="mono">12345</span>(数字だけ)、<span class="mono">tanaka</span>(アルファベットだけ)、どれでも大丈夫です。<br>
        ひらがな・カタカナ・漢字は使えませんのでご注意ください。
      </p>

      <label for="password">パスワード</label>
      <input type="password" id="password" required autocomplete="current-password">
      <p class="hint-text" id="password-hint" style="display:none;">
        6文字以上にしてください。数字だけ(例: <span class="mono">123456</span>)、アルファベットだけ(例: <span class="mono">abcdef</span>)、数字とアルファベットを混ぜたもの、どれでも大丈夫です。
      </p>

      <button type="submit" class="btn btn-primary" id="submit-btn">ログイン</button>
      <p class="error-msg" id="error-msg"></p>
    </form>

    <p style="text-align:center; margin-top:18px;">
      <button type="button" class="btn btn-ghost" id="toggle-mode">アカウントを持っていない方はこちら(新規登録)</button>
    </p>
    <p style="text-align:center; margin-top:4px;">
      <a href="guide.html" class="btn btn-ghost">使い方ガイドを見る</a>
    </p>
  </div>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
